<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<div th:insert="~{fragments/head}"></div>
<style>
  .uk-card-body {
    background-color: #A7C7E7 !important;  
  }
  .no-match-card {  
  color: #222 !important;
  transition: transform 0.3s ease, box-shadow 0.3s ease !important;
}

.no-match-card:hover {
  transform: scale(1.02) !important;
}

.no-match-text {
  color: #333 !important;
  font-weight: bold !important;
  font-size: inherit !important; 
} 
</style>

<body>
<div th:insert="~{fragments/navbar}"></div>

<main id="main-content" class="uk-flex uk-flex-center uk-flex-middle">
  <div class="uk-container uk-text-center uk-width-1-2" style="height: 100vh; padding-bottom: 9rem;">
    <h6 class="uk-margin-small-top uk-margin-medium-bottom uk-text-bold" style="color: black !important;">Back Of the Net Soccer Analytics</h6>
    
    <div class="uk-container uk-text-center uk-width-1-2 uk-margin-remove-bottom" style="background-color: #E5E4E2 !important">
    <p class="uk-text-center uk-text-bold">Back of the Net - Your shortcut to today’s top soccer results, stats, and tables.	</p>
    </div>
  
    <div class="uk-position-relative uk-visible-toggle uk-light uk-margin-medium-top uk-margin-medium-bottom" tabindex="-1" uk-slider="center: true; autoplay: true; autoplay-interval: 2500">
      <div class="uk-slider-items uk-child-width-1-3@m uk-grid">
    
	    <div th:each="league : ${leagues}">
	      <div class="uk-card uk-card-default uk-card-body uk-flex uk-flex-center uk-flex-middle uk-text-center uk-height-small">
	        <img th:src="${league.emblem}" alt="League Emblem" style="height:120px; object-fit:contain;" />
	      </div>
	    </div>

      </div>

	  <a class="uk-position-center-left uk-position-small uk-hidden-hover" href uk-slidenav-previous uk-slider-item="previous"></a>
	  <a class="uk-position-center-right uk-position-small uk-hidden-hover" href uk-slidenav-next uk-slider-item="next"></a>
   </div>
    
    <div class="uk-flex uk-flex-center uk-margin-remove-top">
	  <div class="uk-width-3xlarge">
	    <div class="uk-child-width-1-3@m uk-flex-center uk-grid-small uk-grid-match" uk-grid>
	
	     <div>
		  <div class="uk-card uk-card-small uk-card-default uk-card-body uk-width-large"
		       uk-scrollspy="cls: uk-animation-slide-left; repeat: true">
		    <h3 class="uk-card-title uk-text-small uk-text-bold uk-text-center">Champions League</h3>
		    <div th:if="${randomMatch != null and randomMatch['homeName'] != null}">
		      <div class="uk-flex uk-flex-middle uk-flex-between uk-margin-small-top">
		        <div class="uk-text-center">
		          <img th:src="${randomMatch['homeCrest']}" alt="Home" width="45" height="45">
		          <div class="uk-text-small uk-text-muted uk-margin-small-top uk-text-break uk-text-bold" 
		               style="color: #880808 !important;"
		               th:text="${randomMatch['homeName']}"></div>
		        </div>
		         <div class="uk-text-center">
		          <div>
		            <span class="uk-text-bold uk-text-uppercase uk-text-muted" style="color: #880808 !important;">VS</span>
		          </div>
		          <div class="uk-margin-xsmall-top">
		            <span class="uk-text-medium uk-text-bold">
		              <span th:text="${randomMatch['homeScore']}"></span>
		              <span> - </span>
		              <span th:text="${randomMatch['awayScore']}"></span>
		            </span>
		          </div>
		        </div>
		        <div class="uk-text-center">
		          <img th:src="${randomMatch['awayCrest']}" alt="Away" width="45" height="45">
		          <div class="uk-text-small uk-text-muted uk-margin-small-top uk-text-break uk-text-bold" 
		               style="color: #880808 !important;"
		               th:text="${randomMatch['awayName']}"></div>
		        </div>
		      </div> 
		    </div> 
		    <div th:if="${randomMatch == null or randomMatch['homeName'] == null}"
			     class="uk-card uk-card-body no-match-card uk-text-center uk-flex uk-flex-middle uk-flex-center">
			  <p class="uk-text-lead no-match-text uk-margin-remove">⚽ No match data available.</p>
			</div>
		  </div>
		 </div>
	      
	     <div>
		  <div class="uk-card uk-card-small uk-card-default uk-card-body uk-width-large"
		       uk-scrollspy="cls: uk-animation-slide-left; repeat: true">
		    <h3 class="uk-card-title uk-text-small uk-text-bold uk-text-center">Premier League</h3>
		    <div th:if="${randomPLMatch != null and randomPLMatch['homeName'] != null}">
		      <div class="uk-flex uk-flex-middle uk-flex-between uk-margin-small-top">
		        <div class="uk-text-center">
		          <img th:src="${randomPLMatch['homeCrest']}" alt="Home" width="45" height="45">
		          <div class="uk-text-small uk-text-muted uk-margin-small-top uk-text-break uk-text-bold"
		               style="color: #880808 !important;"
		               th:text="${randomPLMatch['homeName']}"></div>
		        </div> 
		        <div class="uk-text-center">
		          <div>
		            <span class="uk-text-bold uk-text-uppercase uk-text-muted " style="color: #880808 !important;">VS</span>
		          </div>
		          <div class="uk-margin-xsmall-top">
		            <span class="uk-text-medium uk-text-bold">
		              <span th:text="${randomPLMatch['homeScore']}"></span>
		              <span> - </span>
		              <span th:text="${randomPLMatch['awayScore']}"></span>
		            </span>
		          </div>
		        </div>
		        <div class="uk-text-center">
		          <img th:src="${randomPLMatch['awayCrest']}" alt="Away" width="45" height="45">
		          <div class="uk-text-small uk-text-muted uk-margin-small-top uk-text-break uk-text-bold text-color"
		               style="color: #880808 !important;" 
		               th:text="${randomPLMatch['awayName']}"></div>
		        </div>
		      </div>
            </div>
		    <div th:if="${randomMatch == null or randomMatch['homeName'] == null}"
			     class="uk-card uk-card-body no-match-card uk-text-center uk-flex uk-flex-middle uk-flex-center">
			  <p class="uk-text-lead no-match-text uk-margin-remove">⚽ No match data available.</p>
			</div> 
		  </div>
		</div>
	     
	   </div> 
      </div>  
     </div>     
   </div>  	
</main>
  
<div th:insert="~{fragments/footer}"></div> 

<script> 
  function refreshMainContent() {
    fetch(window.location.href, { headers: { "X-Requested-With": "XMLHttpRequest" } })
      .then(response => response.text())
      .then(html => {
        const parser = new DOMParser();
        const doc = parser.parseFromString(html, 'text/html');
        const newMain = doc.querySelector('#main-content');
        const currentMain = document.querySelector('#main-content');
        if (newMain && currentMain) {
          currentMain.innerHTML = newMain.innerHTML;
        }
      })
      .catch(err => console.error('Error refreshing main content:', err));
  } 
  
  <!-- const eventSource = new EventSource("/cache/updates");

  eventSource.addEventListener("cacheRefresh", () => {
    console.log('🔄 Cache refresh detected, updating main content...');
    refreshMainContent();
  });

  eventSource.onerror = (err) => {
    console.error('SSE connection error:', err);
  }; --> 
</script>

</body>
</html>
