<!DOCTYPE html>

<div th:insert="~{fragments/head}"></div>

<style>
  .uk-card {
    position: relative;
    overflow: hidden;
    opacity: 0.9 !important;
    transition: transform 0.3s ease, opacity 0.3s ease;
  }

  .uk-card:hover {
    transform: scale(1.05);
    opacity: 1;
  }

  .uk-card-body {
    background-color: #A7C7E7 !important; 
    background-image: url("[[@{/images/soccer-bg.jpg}]]");
    background-size: cover;
    background-repeat: no-repeat;
    background-position: center;
    position: relative;
  }

  #more-grid a {
    color: #0047AB !important;
    font-weight: bolder !important;
  }

  .soccer-ball {
    position: absolute;
    width: 30px;
    height: 30px;
    background-image: url('https://upload.wikimedia.org/wikipedia/commons/d/d3/Soccerball.svg');
    background-size: cover;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0);
    transition: transform 0.2s ease-in-out;
    pointer-events: none;
  }

  .uk-card:hover .soccer-ball {
    transform: translate(-50%, -50%) scale(1);
    animation: moveBall 2.5s ease-in-out infinite;
  }

  @keyframes moveBall {
    0% {
      top: 10%;
      left: 10%;
      transform: translate(-50%, -50%) rotate(0deg);
    }
    25% {
      top: 80%;
      left: 20%;
      transform: translate(-50%, -50%) rotate(90deg);
    }
    50% {
      top: 70%;
      left: 80%;
      transform: translate(-50%, -50%) rotate(180deg);
    }
    75% {
      top: 20%;
      left: 70%;
      transform: translate(-50%, -50%) rotate(270deg);
    }
    100% {
      top: 10%;
      left: 10%;
      transform: translate(-50%, -50%) rotate(360deg);
    }
  }
</style>

<script> 
    document.querySelectorAll('.uk-card').forEach(card => {
      card.addEventListener('mouseenter', () => {
        const ball = card.querySelector('.soccer-ball');
        if (ball) {
          const randomDelay = Math.random() * 1; // 0–1s random start
          ball.style.animationDelay = `${randomDelay}s`;
        }
      });
    });
